<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Quick Input</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #container {
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }
        #input-area {
            flex: 1;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            padding: 8px;
            font-size: 13px;
            resize: none;
            outline: none;
        }
        #input-area::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        #button-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        #status-text {
            position: absolute;
            bottom: 2px;
            left: 8px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        #status-text.success {
            color: #10b981;
        }
        button {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #btn-send {
            background: #3b82f6;
            color: white;
        }
        #btn-send:hover {
            background: #2563eb;
        }
        #btn-send:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        #btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        #btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #btn-pin {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 32px;
            flex: 0 0 32px;
        }
        #btn-pin:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #btn-pin.pinned {
            background: #3b82f6;
        }
        #btn-save {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            width: 32px;
            flex: 0 0 32px;
        }
        #btn-save:hover {
            background: rgba(16, 185, 129, 0.3);
        }
        #btn-save.saving {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="container">
        <textarea id="input-area" placeholder="输入消息...按 Enter 发送，Shift+Enter 换行"></textarea>
        <div id="button-row">
            <button id="btn-pin" title="常驻显示">📌</button>
            <button id="btn-save" title="保存记忆">💾</button>
            <button id="btn-send">发送</button>
            <button id="btn-cancel">取消</button>
        </div>
        <div id="status-text"></div>
    </div>

    <script>
        const inputArea = document.getElementById('input-area');
        const btnSend = document.getElementById('btn-send');
        const btnCancel = document.getElementById('btn-cancel');
        const btnPin = document.getElementById('btn-pin');
        const btnSave = document.getElementById('btn-save');
        const statusText = document.getElementById('status-text');
        let isPinned = false;

        // Show status message
        function showStatus(message, isSuccess = false) {
            statusText.textContent = message;
            statusText.className = isSuccess ? 'success' : '';
            setTimeout(() => {
                statusText.textContent = '';
                statusText.className = '';
            }, 2000);
        }

        // Focus input on load
        inputArea.focus();

        // Send message
        function sendMessage() {
            const text = inputArea.value.trim();
            if (!text) return;

            btnSend.disabled = true;
            if (window.electronAPI?.sendQuickMessage) {
                window.electronAPI.sendQuickMessage(text);
            }
            inputArea.value = '';

            // Close window if not pinned
            if (!isPinned) {
                setTimeout(() => {
                    if (window.electronAPI?.closeQuickInput) {
                        window.electronAPI.closeQuickInput();
                    }
                }, 100);
            } else {
                btnSend.disabled = false;
                inputArea.focus();
            }
        }

        // Button handlers
        btnSend.addEventListener('click', sendMessage);
        btnCancel.addEventListener('click', () => {
            if (window.electronAPI?.closeQuickInput) {
                window.electronAPI.closeQuickInput();
            }
        });

        btnPin.addEventListener('click', () => {
            isPinned = !isPinned;
            btnPin.classList.toggle('pinned', isPinned);
            btnPin.textContent = isPinned ? '📍' : '📌';
            showStatus(isPinned ? '已开启常驻模式' : '已关闭常驻模式', true);
        });

        btnSave.addEventListener('click', async () => {
            if (!window.electronAPI?.triggerMemorySave) {
                showStatus('记忆系统不可用');
                return;
            }

            btnSave.classList.add('saving');
            btnSave.disabled = true;

            try {
                const result = await window.electronAPI.triggerMemorySave();
                if (result.success) {
                    showStatus('记忆已保存', true);
                } else {
                    showStatus('保存失败');
                }
            } catch (e) {
                showStatus('保存失败: ' + e.message);
            } finally {
                btnSave.classList.remove('saving');
                btnSave.disabled = false;
            }
        });

        // Keyboard shortcuts
        inputArea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                // Enter to send (Shift+Enter for newline)
                e.preventDefault();
                sendMessage();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                if (window.electronAPI?.closeQuickInput) {
                    window.electronAPI.closeQuickInput();
                }
            }
        });

        console.log('[QuickInput] Window loaded');
    </script>
</body>
</html>
